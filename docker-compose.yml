version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finmate-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: finmate-ai-service
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finmate-backend
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/finmate?schema=public
      - JWT_SECRET=super-secret-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - AI_SERVICE_URL=http://ai-service:8000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - ai-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finmate-frontend
    environment:
      - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
